<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Sweetest Days Album</title>
    
    <!-- iOS Web App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SweetMemories">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Mali:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ffafbd;
            --soft-rose: #ffc3a0;
            --cream-bg: #fffaf0;
        }

        html, body {
            overscroll-behavior-y: contain;
        }

        body {
            font-family: 'Mali', cursive;
            background: linear-gradient(180deg, #fff5f5 0%, #fff9f0 100%);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            color: #5d4037;
        }

        /* ของตกแต่งฟรุ้งฟริ้ง */
        .decor-item {
            position: fixed;
            pointer-events: none;
            z-index: -1;
            opacity: 0.6;
        }

        @keyframes float-slow {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .floating {
            animation: float-slow 4s ease-in-out infinite;
        }

        /* การ์ดอัลบั้ม */
        .album-card {
            border-radius: 30px;
            background: white;
            padding: 10px;
            box-shadow: 0 15px 35px -10px rgba(251, 113, 133, 0.15);
            border: 3px solid #fff;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0;
            cursor: pointer;
        }

        .album-card:hover {
            transform: scale(1.03) rotate(1deg);
            box-shadow: 0 20px 40px -10px rgba(251, 113, 133, 0.25);
        }

        .bright-image {
            filter: brightness(1.03) contrast(1.01);
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
        }

        /* หัวข้อส่วนต่างๆ */
        .section-header {
            margin-left: 2rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title {
            font-family: 'Itim', cursive;
            font-size: 1.75rem;
            background: linear-gradient(to right, #fb7185, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        /* สไลด์โชว์แบบสมูท */
        .slideshow-container {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        .slideshow-container::-webkit-scrollbar {
            display: none;
        }

        /* แถบนำทางกระจกฝ้า */
        .glass-nav {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 175, 189, 0.3);
            padding-top: env(safe-area-inset-top);
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* สไตล์วิดีโอ */
        .video-wrapper {
            border: 8px solid white;
            border-radius: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            background: #eee;
        }

        /* ตกแต่งด้วยลายจุด */
        .polka-dot {
            background-image: radial-gradient(#ffcbd5 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="pb-20 polka-dot">

    <!-- Decorative Elements -->
    <div class="decor-item floating text-4xl" style="top: 10%; left: 5%;">🌸</div>
    <div class="decor-item floating text-3xl" style="top: 25%; right: 5%; animation-delay: 1s;">✨</div>
    <div class="decor-item floating text-5xl" style="bottom: 20%; left: 8%; animation-delay: 2s;">💖</div>
    <div class="decor-item floating text-2xl" style="bottom: 40%; right: 10%; animation-delay: 1.5s;">🎈</div>

    <!-- Header Area -->
    <nav class="glass-nav sticky top-0 z-50 py-5 px-4 mb-10 text-center shadow-sm">
        <div class="flex flex-col items-center">
            <div class="bg-rose-100 text-rose-500 px-4 py-1 rounded-full text-xs font-bold mb-2 tracking-widest uppercase">My Precious Gallery</div>
            <h1 class="text-3xl md:text-5xl font-bold text-rose-400 drop-shadow-sm flex items-center justify-center gap-3">
                <span class="animate-pulse">🎀</span> 
                Sweet Memories 
                <span class="animate-pulse" style="animation-delay: 0.5s">🎀</span>
            </h1>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 space-y-24">
        
        <!-- Section 1: Golden Moments (Auto-Slideshow) -->
        <section class="reveal active">
            <div class="section-header">
                <div class="w-10 h-10 bg-amber-100 rounded-full flex items-center justify-center text-xl">⭐</div>
                <h2 class="section-title">Golden Moments</h2>
                <span class="flex-1 h-px bg-amber-100 ml-4"></span>
            </div>
            
            <div class="relative">
                <div class="slideshow-container" id="goldenSlideshow">
                    <!-- Cards -->
                    <div class="album-card w-72 h-96"><img src="1.jpeg" class="bright-image" alt=""></div>
                    <div class="album-card w-72 h-96"><img src="2.jpeg" class="bright-image" alt=""></div>
                    <div class="album-card w-72 h-96"><img src="3.jpeg" class="bright-image" alt=""></div>
                    <div class="album-card w-72 h-96"><img src="4.jpeg" class="bright-image" alt=""></div>
                    <div class="album-card w-72 h-96"><img src="5.jpeg" class="bright-image" alt=""></div>
                    <div class="album-card w-72 h-96"><img src="6.jpeg" class="bright-image" alt=""></div>
                    <div class="album-card w-72 h-96"><img src="7.jpeg" class="bright-image" alt=""></div>
                    <div class="album-card w-72 h-96"><img src="8.jpeg" class="bright-image" alt=""></div>
                    <div class="album-card w-72 h-96"><img src="9.jpeg" class="bright-image" alt=""></div>
                    <div class="album-card w-72 h-96"><img src="10.jpeg" class="bright-image" alt=""></div>
                    <div class="album-card w-72 h-96"><img src="11.jpeg" class="bright-image" alt=""></div>
                </div>
            </div>
            
            <div class="flex justify-center gap-2 mt-4" id="slideDots"></div>
        </section>

        <!-- Section 2: Happy Working Day -->
        <section class="reveal">
            <div class="section-header">
                <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center text-xl">☀️</div>
                <h2 class="section-title">Happy Working Day</h2>
                <span class="flex-1 h-px bg-orange-100 ml-4"></span>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-2 album-card h-80">
                    <img src="40.jpeg" class="bright-image" alt="">
                </div>
                <div class="flex flex-col gap-6">
                    <div class="album-card flex-1">
                        <img src="39.jpeg" class="bright-image" alt="">
                    </div>
                    <div class="album-card flex-1">
                        <img src="34.jpeg" class="bright-image" alt="">
                    </div>
                </div>
            </div>
        </section>

        <!-- Section 3: Nature Therapy -->
        <section class="reveal">
            <div class="section-header">
                <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center text-xl">🍃</div>
                <h2 class="section-title">Nature Therapy</h2>
                <span class="flex-1 h-px bg-green-100 ml-4"></span>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="album-card h-64 md:rotate-2"><img src="42.jpeg" class="bright-image" alt=""></div>
                <div class="album-card h-64 md:-rotate-1 translate-y-4"><img src="43.jpeg" class="bright-image" alt=""></div>
                <div class="album-card h-64 md:rotate-1"><img src="38.jpeg" class="bright-image" alt=""></div>
                <div class="album-card h-64 md:-rotate-2 translate-y-4"><img src="12.jpeg" class="bright-image" alt=""></div>
            </div>
        </section>

        <!-- Section 4: Video Solo Stage -->
        <section class="reveal flex flex-col items-center">
            <div class="section-header w-full justify-center mb-10">
                <div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center text-xl">🎤</div>
                <h2 class="section-title">Solo Stage</h2>
            </div>
            
            <div class="video-wrapper w-full max-w-[320px] p-2 bg-white">
                <video controls class="w-full aspect-[9/16] object-cover rounded-[25px]">
                    <source src="41.mp4" type="video/mp4">
                </video>
                <div class="p-6 text-center">
                    <h3 class="text-xl font-bold text-purple-500 mb-1">Pop Star Mode!</h3>
                    <p class="text-gray-400 text-sm italic">Making every moment shine ⭐</p>
                </div>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="mt-32 pb-20 text-center">
        <div class="relative inline-block px-10 py-8 bg-white rounded-[40px] shadow-2xl border-4 border-rose-50">
            <div class="absolute -top-6 left-1/2 -translate-x-1/2 bg-rose-400 text-white px-6 py-1 rounded-full text-sm font-bold shadow-lg">End of Page</div>
            <p class="text-rose-400 text-2xl font-bold mb-3">You are the sparkle! ✨</p>
            <p class="text-gray-400 text-sm mb-6">ขอบคุณที่ร่วมเดินทางไปกับความทรงจำของเรา</p>
            <div class="flex justify-center gap-4">
                <span class="text-3xl animate-bounce">🍦</span>
                <span class="text-3xl animate-bounce" style="animation-duration: 2.5s">🍭</span>
                <span class="text-3xl animate-bounce" style="animation-duration: 2.2s">🍮</span>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const slider = document.getElementById('goldenSlideshow');
            const dotsContainer = document.getElementById('slideDots');
            const slides = slider.querySelectorAll('.album-card');
            let currentSlide = 0;
            let isUserInteracting = false;
            let autoPlayTimer;

            // สร้างจุด Indicators
            slides.forEach((_, idx) => {
                const dot = document.createElement('div');
                dot.className = `w-2 h-2 rounded-full bg-rose-200 transition-all duration-300 cursor-pointer ${idx === 0 ? 'w-8 bg-rose-400' : ''}`;
                dot.addEventListener('click', () => {
                    stopAutoPlay();
                    goToSlide(idx);
                    startAutoPlay();
                });
                dotsContainer.appendChild(dot);
            });

            const dots = dotsContainer.querySelectorAll('div');

            function updateDots() {
                dots.forEach((dot, idx) => {
                    if (idx === currentSlide) {
                        dot.classList.add('w-8', 'bg-rose-400');
                        dot.classList.remove('w-2', 'bg-rose-200');
                    } else {
                        dot.classList.remove('w-8', 'bg-rose-400');
                        dot.classList.add('w-2', 'bg-rose-200');
                    }
                });
            }

            function goToSlide(index) {
                if (index >= slides.length) index = 0;
                if (index < 0) index = slides.length - 1;
                
                currentSlide = index;
                const slideWidth = slides[0].offsetWidth + 20;
                slider.scrollTo({ 
                    left: slideWidth * currentSlide, 
                    behavior: 'smooth' 
                });
                updateDots();
            }

            function startAutoPlay() {
                autoPlayTimer = setInterval(() => {
                    if (!isUserInteracting) {
                        currentSlide = (currentSlide + 1) % slides.length;
                        goToSlide(currentSlide);
                    }
                }, 4000); // ปรับเป็น 4 วินาทีเพื่อความกระชับ
            }

            function stopAutoPlay() {
                clearInterval(autoPlayTimer);
            }

            // เริ่ม Auto-play ทันที
            startAutoPlay();

            // ตรวจจับเมื่อผู้ใช้เลื่อนเอง
            slider.addEventListener('scroll', () => {
                const slideWidth = slides[0].offsetWidth + 20;
                const newIndex = Math.round(slider.scrollLeft / slideWidth);
                if (newIndex !== currentSlide && newIndex < slides.length) {
                    currentSlide = newIndex;
                    updateDots();
                }
            });

            // ตรวจจับการสัมผัส
            slider.addEventListener('touchstart', () => { isUserInteracting = true; stopAutoPlay(); });
            slider.addEventListener('touchend', () => { isUserInteracting = false; startAutoPlay(); });

            // Scroll Reveal Animation
            const revealObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
        });
    </script>
</body>
</html>
