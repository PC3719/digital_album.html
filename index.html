<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Sweetest Days Album</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Mali:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Mali', cursive;
            background: #fff5f5;
            color: #5d4037;
            overflow-x: hidden;
        }

        /* ของตกแต่งลอยไปมา */
        .floating-deco {
            position: fixed;
            pointer-events: none;
            z-index: -1;
            opacity: 0.5;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .paper-texture {
            background-image: radial-gradient(#ffcbd5 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* กรอบรูปสไตล์โพลารอยด์ */
        .polaroid {
            background: white;
            padding: 10px 10px 30px 10px;
            box-shadow: 0 8px 20px rgba(251, 113, 133, 0.12);
            border-radius: 4px;
            transition: transform 0.3s ease;
            display: inline-block;
            width: 100%;
        }

        .polaroid:hover {
            transform: scale(1.05) rotate(2deg) !important;
            z-index: 10;
        }

        .cute-title {
            font-family: 'Itim', cursive;
            background: linear-gradient(to right, #fb7185, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-card {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            padding: 2rem;
            backdrop-filter: blur(5px);
            border: 2px dashed #ffcbd5;
        }

        .video-container {
            border: 10px solid white;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            background: #000;
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="paper-texture pb-20">

    <div class="floating-deco text-5xl" style="top: 10%; left: 5%;">🌸</div>
    <div class="floating-deco text-4xl" style="top: 25%; right: 8%; animation-delay: 1s;">✨</div>
    <div class="floating-deco text-6xl" style="bottom: 15%; left: 10%; animation-delay: 2s;">💖</div>
    <div class="floating-deco text-3xl" style="top: 50%; right: 5%; animation-delay: 1.5s;">☁️</div>

    <header class="py-12 text-center">
        <h1 class="text-4xl md:text-6xl font-bold cute-title mb-4 animate-bounce">
            🎀 My Memory Journey 🎀
        </h1>
        <p class="text-rose-400">บันทึกช่วงเวลาที่แสนพิเศษ แยกตามห้วงอารมณ์</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 space-y-20">
        
        <!-- Section 1: Morning Fresh -->
        <section class="reveal section-card">
            <div class="flex items-center gap-4 mb-8">
                <span class="text-4xl">☀️</span>
                <h2 class="text-3xl cute-title font-bold">Morning Fresh</h2>
                <p class="text-gray-400 text-sm ml-auto italic">ความสดใสยามเช้า</p>
            </div>
            <div class="columns-1 sm:columns-2 md:columns-4 gap-6 space-y-6">
                <!-- คัดเลือกรูปที่ดูหน้าใส สดใส -->
                <script>
                    const morningImgs = [1, 2, 6, 12, 19, 22, 26, 31, 35, 38];
                    morningImgs.forEach(i => {
                        let rotate = (Math.random() * 6 - 3).toFixed(2);
                        document.write(`
                            <div class="polaroid" style="transform: rotate(${rotate}deg)">
                                <img src="รูปภาพทั้งหมด/${i}.jpeg" alt="Morning ${i}" class="w-full rounded-sm mb-3">
                                <p class="text-center text-rose-300 text-xs italic">Freshness #${i} 🌿</p>
                            </div>
                        `);
                    });
                </script>
            </div>
        </section>

        <!-- Section 2: Working & Cafe -->
        <section class="reveal section-card">
            <div class="flex items-center gap-4 mb-8">
                <span class="text-4xl">☕</span>
                <h2 class="text-3xl cute-title font-bold">Working & Cafe</h2>
                <p class="text-gray-400 text-sm ml-auto italic">ไลฟ์สไตล์ระหว่างวัน</p>
            </div>
            <div class="columns-1 sm:columns-2 md:columns-4 gap-6 space-y-6">
                <!-- คัดรูปที่โต๊ะทำงาน จิบน้ำ -->
                <script>
                    const cafeImgs = [7, 10, 15, 23, 24, 28, 32, 33, 39, 40];
                    cafeImgs.forEach(i => {
                        let rotate = (Math.random() * 6 - 3).toFixed(2);
                        document.write(`
                            <div class="polaroid" style="transform: rotate(${rotate}deg)">
                                <img src="รูปภาพทั้งหมด/${i}.jpeg" alt="Cafe ${i}" class="w-full rounded-sm mb-3">
                                <p class="text-center text-rose-300 text-xs italic">Day Out #${i} 🍦</p>
                            </div>
                        `);
                    });
                </script>
            </div>
        </section>

        <!-- Section 3: Night Out & Festive -->
        <section class="reveal section-card">
            <div class="flex items-center gap-4 mb-8">
                <span class="text-4xl">🏮</span>
                <h2 class="text-3xl cute-title font-bold">Night Out & Festive</h2>
                <p class="text-gray-400 text-sm ml-auto italic">เสน่ห์ยามค่ำคืน</p>
            </div>
            <div class="columns-1 sm:columns-2 md:columns-4 gap-6 space-y-6">
                <!-- คัดรูปชุดกี่เผ้าแดง -->
                <script>
                    const nightImgs = [3, 4, 5, 8, 9, 11, 14, 16, 17, 18];
                    nightImgs.forEach(i => {
                        let rotate = (Math.random() * 6 - 3).toFixed(2);
                        document.write(`
                            <div class="polaroid" style="transform: rotate(${rotate}deg)">
                                <img src="รูปภาพทั้งหมด/${i}.jpeg" alt="Festive ${i}" class="w-full rounded-sm mb-3">
                                <p class="text-center text-rose-300 text-xs italic">Sparkle #${i} ✨</p>
                            </div>
                        `);
                    });
                </script>
            </div>
        </section>

        <!-- Section 4: Travel & Solo Stage -->
        <section class="reveal section-card">
            <div class="flex items-center gap-4 mb-8">
                <span class="text-4xl">🎬</span>
                <h2 class="text-3xl cute-title font-bold">Travel & Solo Stage</h2>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
                <div class="video-container aspect-[9/16]">
                    <video controls loop class="w-full h-full object-cover">
                        <source src="วิดีโอทั้งหมด/41.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="video-container aspect-[9/16]">
                    <video controls loop class="w-full h-full object-cover">
                        <source src="วิดีโอทั้งหมด/42.mp4" type="video/mp4">
                    </video>
                </div>
            </div>

            <div class="columns-1 sm:columns-2 md:columns-4 gap-6 space-y-6">
                <!-- รูปที่เหลือจากการท่องเที่ยว -->
                <script>
                    const travelImgs = [13, 20, 21, 25, 27, 29, 30, 34, 36, 37];
                    travelImgs.forEach(i => {
                        let rotate = (Math.random() * 6 - 3).toFixed(2);
                        document.write(`
                            <div class="polaroid" style="transform: rotate(${rotate}deg)">
                                <img src="รูปภาพทั้งหมด/${i}.jpeg" alt="Travel ${i}" class="w-full rounded-sm mb-3">
                                <p class="text-center text-rose-300 text-xs italic">Journey #${i} 🎈</p>
                            </div>
                        `);
                    });
                </script>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="mt-24 text-center py-12 border-t border-rose-100">
        <p class="text-2xl font-bold cute-title">Every moment matters! 🍭</p>
        <p class="text-gray-400 mt-2 italic">บันทึกเรื่องราวของคุณไว้ในใจตลอดไป</p>
        <div class="mt-6 flex justify-center gap-4">
            <span class="animate-pulse">🌸</span>
            <span class="animate-pulse" style="animation-delay: 0.3s">🎀</span>
            <span class="animate-pulse" style="animation-delay: 0.6s">🌸</span>
        </div>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
